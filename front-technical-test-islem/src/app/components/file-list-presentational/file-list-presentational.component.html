<div class="app-layout">
	<main class="main-content">
		<app-breadcrumb
			*ngIf="breadcrumbPath && breadcrumbPath.length > 0"
			[path]="breadcrumbPath"
			(navigate)="onNavigateToFolder($event)">
		</app-breadcrumb>

		<div
			class="content-container"
			cdkDropList
			(cdkDropListDropped)="filesDropped.emit($event.item.data)"
			[cdkDropListData]="[]">
			<!-- Drag overlay -->
			<div *ngIf="isDraggingFile" class="overlay overlay-drag">
				<div class="overlay-content">
					<span class="material-symbols-outlined overlay-icon">upload_file</span>
					<p class="overlay-text">Drop files here to upload</p>
				</div>
			</div>

			<!-- Loading indicator -->
			<div *ngIf="isLoading" class="overlay overlay-loading">
				<div class="overlay-content">
					<span class="material-symbols-outlined overlay-icon rotating">sync</span>
					<p class="overlay-text">Loading...</p>
				</div>
			</div>

			<!-- Upload indicator -->
			<div *ngIf="isUploading" class="overlay overlay-upload">
				<div class="overlay-content">
					<span class="material-symbols-outlined overlay-icon rotating">cloud_upload</span>
					<p class="overlay-text">Uploading files...</p>
				</div>
			</div>

			<!-- Folders Section -->
			<section
				class="content-section"
				*ngIf="getFolders().length > 0">
				<h2 class="section-heading">
					<span class="material-symbols-outlined section-icon">folder</span>
					Folders
				</h2>
				<div class="grid">
					<app-file-card
						*ngFor="let folder of getFolders()"
						[file]="folder"
						[fileTypeInfo]="getFileTypeInfo(folder)"
						[previewUrl]="null"
						(fileClick)="onItemClickHandler($event)"
						(rename)="onRenameItemClick($event)"
						(delete)="onDeleteItemClick($event)">
					</app-file-card>
				</div>
			</section>

			<!-- Files Section -->
			<section class="content-section" *ngIf="getFiles().length > 0">
				<h2 class="section-heading">
					<span class="material-symbols-outlined section-icon">description</span>
					Files
				</h2>
				<div class="grid">
					<app-file-card
						*ngFor="let file of getFiles()"
						[file]="file"
						[fileTypeInfo]="getFileTypeInfo(file)"
						[previewUrl]="getFilePreviewUrl(file)"
						(fileClick)="onItemClickHandler($event)"
						(download)="onDownloadFileClick($event)"
						(rename)="onRenameItemClick($event)"
						(delete)="onDeleteItemClick($event)">
					</app-file-card>
				</div>
			</section>

			<!-- Empty State -->
			<div *ngIf="items && items.length === 0 && !isLoading" class="empty-state">
				<div class="empty-state-content">
					<span class="material-symbols-outlined empty-state-icon icon-filled">folder_open</span>
					<h3 class="empty-state-title">No files yet</h3>
					<p class="empty-state-text">Drag and drop files here or use the sidebar to upload</p>
				</div>
			</div>
		</div>
	</main>

	<app-sidebar
		[currentFolderId]="currentFolderId"
		[folders]="rootFolders ?? []"
		(createFolder)="onCreateFolderClick()"
		(uploadFiles)="onFilesSelected($event)"
		(uploadFolder)="onFolderSelected($event)"
		(folderSelect)="onNavigateToFolder($event)">
	</app-sidebar>
</div>
